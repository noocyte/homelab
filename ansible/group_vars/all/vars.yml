---
# Portainer
portainer_image: "portainer/portainer-ce:lts"
portainer_web_port: "9443"

# Proxmox Cluster Connection Details
pve_api_host: "192.168.0.107"
pve_api_user: "root@pam"
pve_node: "pve"
target_storage: "local-lvm"

# VM Identity
vm_id: 800
vm_name: "docker-host"

# Dynamic Hardware Specs
vm_cores: 2
vm_memory: 8192
vm_disk_size: "128G"
vm_disk_type: "scsi"
vm_scsi_hardware: "virtio-scsi-pci"
vm_network_bridge: "vmbr0"

# OS Image
vm_template_source: 9000

# Cloud-Init Public SSH Key
vm_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPCkWXW54OuMCISwdaPme9cBQloqoyvVwj4vOL8y6gAv jarle@famnygaard.com"
