---
- name: Provision Docker VM on Proxmox
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Clone VM from Golden Cloud-Init Template via SSH
      ansible.builtin.command: >
        ssh -o StrictHostKeyChecking=no root@{{ pve_api_host }}
        "qm clone {{ vm_template_source }} {{ vm_id }} --name {{ vm_name }} --full true --storage {{ target_storage }}"
      changed_when: true

    - name: Configure Hardware Specs and Cloud-Init Overrides
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_password: "{{ lookup('ansible.builtin.env', 'PVE_PASSWORD') }}"
        validate_certs: false
        node: "{{ pve_node }}"
        vmid: "{{ vm_id }}"

        # Hardware Tune-up
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"

        # Cloud-Init Inject (SSH Key & DHCP)
        sshkeys: "{{ vm_ssh_public_key }}"
        ipconfig:
          ipconfig0: "ip=dhcp"

        update: true
        state: present

    - name: Start the Virtual Machine
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_api_user }}"
        api_password: "{{ lookup('ansible.builtin.env', 'PVE_PASSWORD') }}"
        validate_certs: false
        node: "{{ pve_node }}"
        vmid: "{{ vm_id }}"
        state: started
